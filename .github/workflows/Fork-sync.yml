name: Fork-sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 18 * * *"  # 每天北京时间凌晨1点运行 (UTC 17点)
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      # Step 1: run a standard checkout action
      - name: Checkout target repo
        uses: actions/checkout@v4

      # Step 2: run the sync action
      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: hafrey1/LunaTV-config
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }} # automatically generated, no need to set

          # Set test_mode true to run tests instead of the true action!!
          test_mode: false
          
      # 👇 新增：强制覆盖不重要的冲突文件
      - name: Force override unimportant conflicting files
        if: failure()  # 只有当同步失败（有冲突）时才执行
        run: |
          # 添加 upstream 作为远程仓库
          git remote add upstream https://github.com/hafrey1/LunaTV-config.git
          git fetch upstream main
          
          # 强制用 upstream 的版本覆盖那两个文件
          # 👇 把下面的路径替换成你实际冲突的两个文件路径
          git checkout upstream/main -- README.md report.md
          
          # 提交这个覆盖操作
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Auto-resolve: force use upstream version for unimportant files" || echo "No changes to commit"
          
          # 强制推送
          git push origin main --force
          
      - name: Sync check
        if: failure()
        run: |
          echo "[Error] 由于上游仓库的 workflow 文件变更，导致 GitHub 自动暂停了本次自动更新，你需要手动 Sync Fork 一次，详细教程请查看项目README.md "
          echo "[Error] Due to a change in the workflow file of the upstream repository, GitHub has automatically suspended the scheduled automatic update. You need to manually sync your fork. Please refer to the project README.md for instructions. "
          exit 1
          
      - name: Delete workflow runs
      # 删除工作流记录/只保留1天记录
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 5
